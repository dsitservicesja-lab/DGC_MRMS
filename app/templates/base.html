<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title if title else "DGC Requests" }}</title>
  <link rel="icon" type="image/png" href="/logo"/>
  <link rel="apple-touch-icon" href="/logo"/>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/logo" alt="DGC logo" class="brand-logo"/>
      <div class="brand-info">
        <span class="brand-text">DGC Requests & Approvals</span>
        <span class="brand-sub">Department of Government Chemist</span>
      </div>
    </div>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Toggle navigation">
      <i class="lucide-menu"></i>
    </button>
    <nav class="nav-links">
      <a href="/"><i class="lucide-home"></i> Home</a>
      <a href="/meetings/new"><i class="lucide-calendar-plus"></i> Meeting</a>
      <a href="/messenger/new"><i class="lucide-send"></i> Messenger</a>
      <a href="/my-requests"><i class="lucide-search"></i> My Requests</a>
      {% if admin %}
        <a href="/admin"><i class="lucide-layout-dashboard"></i> Dashboard</a>
        <a href="/logout"><i class="lucide-log-out"></i> Logout</a>
      {% else %}
        <a href="/login"><i class="lucide-lock"></i> Login</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">
    <div class="footer-inner">
      <span><i class="lucide-shield-check"></i> Internal system for DGC service requests and approvals</span>
      <span class="footer-sep">•</span>
      <span>Department of Government Chemist, Jamaica</span>
    </div>
  </footer>
</body>
</html>
