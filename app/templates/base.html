<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title if title else "DGC Requests" }}</title>
  <link rel="icon" type="image/png" href="/logo"/>
  <link rel="apple-touch-icon" href="/logo"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="/logo" alt="DGC logo" class="brand-logo"/>
      <span class="brand-text">Department of Government Chemist • Requests & Approvals</span>
    </div>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a href="/meetings/new">New Meeting Request</a>
      <a href="/messenger/new">New Messenger Request</a>
      {% if admin %}
        <a href="/admin">Admin</a>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/login">Admin/Superadmin Login</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Internal system for DGC service requests and approvals.</footer>
</body>
</html>
